<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fruity Glow - Inicio de Sesión</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
  <link href="../CSS/style.css" rel="stylesheet" />
  <script src="../JS/main.js"></script>
  
</head>

<body class="login-body">


  <div class="login-topbar">
    <span>INICIO DE SESION</span>
  </div>


  <div class="login-wrapper">
    <div class="login-card">

   
      <a href="../index.html" class="login-logo kavoon-regular">Fruity Glow.</a>

  
      <h2 class="login-titulo">Crea una cuenta</h2>
      <p class="login-subtitulo">Ingresa tu correo electrónico para registrarte en esta app</p>

  
      <input
        type="email"
        class="login-input"
        id="correo-login"
        placeholder="correoelectrónico@dominio.com"
      />

  
      <button class="login-btn-negro" onclick="registrar()">
        Registrarse con correo electrónico
      </button>


      <div class="login-separador">
        <span>o continuar con</span>
      </div>


      <button class="login-btn-google">
        <img src="https://www.svgrepo.com/show/475656/google-color.svg" alt="Google" class="google-icon"/>
        Google
      </button>

  
      <p class="login-terminos">
        Al hacer clic en Continuar aceptas nuestros<br/>
        <a href="#" class="login-link">Términos de servicio</a>
        y la
        <a href="#" class="login-link">Política de privacidad</a>
      </p>

  
      <p class="login-error" id="login-error">Ingresa un correo electrónico válido</p>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    function registrar() {
      const correo = document.getElementById('correo-login').value.trim();
      const error = document.getElementById('login-error');
      const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

      if (!emailRegex.test(correo)) {
        error.style.display = 'block';
        document.getElementById('correo-login').classList.add('input-error');
      } else {
        error.style.display = 'none';
        document.getElementById('correo-login').classList.remove('input-error');
       
        alert('¡Registro exitoso! Bienvenido a Fruity Glow.');
      }
    }
  </script>

</body>
</html>
