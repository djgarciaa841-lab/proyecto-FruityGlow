<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fruity Glow - Inicio de Sesión</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
  <link href="../CSS/style.css" rel="stylesheet" />
  <script src="../JS/main.js"></script>

</head>

<body class="login-body">


  <div class="login-topbar">
    <span>INICIO DE SESION</span>
  </div>


  <div class="login-wrapper">
    <div class="login-card">


      <a href="../index.html" class="login-logo kavoon-regular">Fruity Glow.</a>


      <div class="login-tabs d-flex w-100" style="gap: 8px;">
        <button type="button" class="login-tab-btn active" id="tab-login" onclick="cambiarTab('login')">Iniciar sesión</button>
        <button type="button" class="login-tab-btn" id="tab-registro" onclick="cambiarTab('registro')">Crear cuenta</button>
      </div>


      <!-- ===== Formulario LOGIN ===== -->
      <div id="form-login" class="w-100 d-flex flex-column" style="gap: 1rem;">

        <h2 class="login-titulo">Inicia sesión</h2>
        <p class="login-subtitulo">Ingresa tus datos para acceder a tu cuenta</p>

        <input
          type="email"
          class="login-input"
          id="login-email"
          placeholder="correoelectrónico@dominio.com"
        />

        <input
          type="password"
          class="login-input"
          id="login-password"
          placeholder="Contraseña"
        />

        <button class="login-btn-negro" onclick="iniciarSesion()">
          Iniciar sesión
        </button>

        <p class="login-error" id="login-error"></p>
      </div>


      <!-- ===== Formulario REGISTRO ===== -->
      <div id="form-registro" class="w-100 d-flex flex-column" style="gap: 1rem; display: none;">

        <h2 class="login-titulo">Crea una cuenta</h2>
        <p class="login-subtitulo">Completa tus datos para registrarte en esta app</p>

        <input
          type="text"
          class="login-input"
          id="registro-nombre"
          placeholder="Nombre completo"
        />

        <input
          type="email"
          class="login-input"
          id="registro-email"
          placeholder="correoelectrónico@dominio.com"
        />

        <input
          type="password"
          class="login-input"
          id="registro-password"
          placeholder="Contraseña (mínimo 6 caracteres)"
        />

        <button class="login-btn-negro" onclick="registrar()">
          Registrarse con correo electrónico
        </button>

        <p class="login-error" id="registro-error"></p>
      </div>


      <div class="login-separador">
        <span>o continuar con</span>
      </div>


      <button class="login-btn-google">
        <img src="https://www.svgrepo.com/show/475656/google-color.svg" alt="Google" class="google-icon"/>
        Google
      </button>


      <p class="login-terminos">
        Al hacer clic en Continuar aceptas nuestros<br/>
        <a href="#" class="login-link">Términos de servicio</a>
        y la
        <a href="#" class="login-link">Política de privacidad</a>
      </p>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
